<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cards & Smoke | Ledger</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        function App() {
            const [view, setView] = useState('manage');
            const [showSettlement, setShowSettlement] = useState(false);
            
            // --- PERSISTENCE ---
            const [players, setPlayers] = useState(() => {
                const saved = localStorage.getItem('cs_players_vfinal');
                return saved ? JSON.parse(saved) : [{ id: Date.now(), name: "Alex", buyIn: 5000, chips: 0 }];
            });

            const [expenses, setExpenses] = useState(() => {
                const saved = localStorage.getItem('cs_expenses_vfinal');
                return saved ? JSON.parse(saved) : [];
            });

            const [totalCommPot, setTotalCommPot] = useState(0);
            const [houseRake, setHouseRake] = useState(0);
            const [entitledPlayers, setEntitledPlayers] = useState([]);
            
            // Per Round Helper State
            const [potSize, setPotSize] = useState("");

            useEffect(() => {
                localStorage.setItem('cs_players_vfinal', JSON.stringify(players));
                localStorage.setItem('cs_expenses_vfinal', JSON.stringify(expenses));
            }, [players, expenses]);

            // --- CORRECTED CALCULATOR LOGIC ---
            const suggestedLevy = useMemo(() => {
                const pot = parseFloat(potSize) || 0;
                // Rule: Below 1000 is exempt. 1000 and above = 5%
                if (pot < 1000) return 0;
                return pot * 0.05; 
            }, [potSize]);

            // --- ACTIONS ---
            const addPlayer = () => {
                setPlayers([...players, { id: Date.now(), name: `Seat ${players.length + 1}`, buyIn: 5000, chips: 0 }]);
            };

            const updatePlayer = (id, field, val) => {
                setPlayers(players.map(p => p.id === id ? { ...p, [field]: val } : p));
            };

            const removePlayer = (id) => {
                if (players.length > 1) setPlayers(players.filter(p => p.id !== id));
            };

            const addExpense = () => {
                setExpenses([...expenses, { id: Date.now(), label: "", amount: 0, payers: [] }]);
            };

            const updateExpense = (id, field, val) => {
                setExpenses(expenses.map(e => e.id === id ? { ...e, [field]: val } : e));
            };

            const toggleExpensePayer = (expId, playerId) => {
                setExpenses(expenses.map(e => {
                    if (e.id !== expId) return e;
                    const newPayers = e.payers.includes(playerId) ? e.payers.filter(id => id !== playerId) : [...e.payers, playerId];
                    return { ...e, payers: newPayers };
                }));
            };

            const totalRefresh = () => {
                if (window.confirm("TOTAL REFRESH: Reset to 'Alex'?")) {
                    setPlayers([{ id: Date.now(), name: "Alex", buyIn: 5000, chips: 0 }]);
                    setExpenses([]);
                    setTotalCommPot(0);
                    setHouseRake(0);
                    setEntitledPlayers([]);
                    setPotSize("");
                    setShowSettlement(false);
                }
            };

            // --- MATH ---
            const distributablePot = Math.max(0, totalCommPot - houseRake);
            const results = useMemo(() => {
                return players.map(p => {
                    let net = p.chips - p.buyIn;
                    if (entitledPlayers.includes(p.id) && entitledPlayers.length > 0) {
                        net += (distributablePot / entitledPlayers.length);
                    }
                    expenses.forEach(exp => {
                        if (exp.payers.includes(p.id) && exp.payers.length > 0) {
                            net -= (exp.amount / exp.payers.length);
                        }
                    });
                    return { name: p.name, net: Math.round(net) };
                });
            }, [players, distributablePot, entitledPlayers, expenses]);

            const settlements = useMemo(() => {
                if (!showSettlement) return [];
                let debtors = results.filter(r => r.net < 0).map(r => ({ ...r, net: Math.abs(r.net) }));
                let creditors = results.filter(r => r.net > 0).map(r => ({ ...r }));
                const trans = [];
                debtors.forEach(d => {
                    creditors.forEach(c => {
                        if (d.net > 0 && c.net > 0) {
                            const amount = Math.min(d.net, c.net);
                            trans.push({ from: d.name, to: c.name, amount: Math.round(amount) });
                            d.net -= amount;
                            c.net -= amount;
                        }
                    });
                });
                return trans;
            }, [results, showSettlement]);

            return (
                <div className="max-w-md mx-auto p-4 min-h-screen pb-20">
                    <header className="flex justify-between items-center mb-8 pt-4">
                        <h1 className="font-black text-orange-500 tracking-tighter text-3xl italic">CARDS & SMOKE</h1>
                        <div className="flex bg-gray-800 rounded-xl p-1">
                            <button onClick={() => setView('manage')} className={`px-6 py-2 rounded-lg text-xs font-black uppercase tracking-widest ${view === 'manage' ? 'bg-orange-600' : 'text-gray-500'}`}>Setup</button>
                            <button onClick={() => setView('tally')} className={`px-6 py-2 rounded-lg text-xs font-black uppercase tracking-widest ${view === 'tally' ? 'bg-orange-600' : 'text-gray-500'}`}>Tally</button>
                        </div>
                    </header>

                    {view === 'manage' ? (
                        <div className="space-y-4">
                            {players.map(p => (
                                <div key={p.id} className="bg-gray-800 p-5 rounded-2xl border border-gray-700">
                                    <div className="flex justify-between items-center mb-4">
                                        <input className="bg-transparent font-black text-white text-xl outline-none w-3/4 focus:border-b border-orange-500" value={p.name} onChange={e => updatePlayer(p.id, 'name', e.target.value)} />
                                        <button onClick={() => removePlayer(p.id)} className="text-gray-600 hover:text-red-500 text-xl font-bold">✕</button>
                                    </div>
                                    <label className="text-[10px] text-gray-500 uppercase font-black tracking-widest">Total Buy-In</label>
                                    <input type="number" className="bg-gray-900 w-full p-3 rounded-xl mt-1 font-mono text-orange-400 text-lg" value={p.buyIn} onChange={e => updatePlayer(p.id, 'buyIn', parseInt(e.target.value) || 0)} />
                                </div>
                            ))}
                            <button onClick={addPlayer} className="w-full border-2 border-dashed border-gray-800 p-5 rounded-2xl text-gray-600 font-black uppercase tracking-widest hover:border-orange-500 hover:text-orange-500">+ Add Player</button>
                        </div>
                    ) : (
                        <div className="space-y-6">
                            {/* UPDATED CALCULATOR */}
                            <section className="bg-orange-900/10 p-5 rounded-2xl border-2 border-orange-500/20">
                                <h3 className="text-[10px] font-black text-orange-500 mb-3 uppercase tracking-widest">Per Round Levy Helper</h3>
                                <div className="flex gap-3 items-center">
                                    <input type="number" placeholder="Pot Size" className="bg-gray-900 p-3 rounded-xl flex-1 text-sm outline-none ring-1 ring-gray-700 focus:ring-orange-500" value={potSize} onChange={e => setPotSize(e.target.value)} />
                                    <div className="text-right">
                                        <span className="text-[8px] text-gray-500 uppercase block">Collect</span>
                                        <span className={`text-xl font-black ${suggestedLevy > 0 ? 'text-white' : 'text-gray-700'}`}>${suggestedLevy}</span>
                                    </div>
                                </div>
                                {potSize && parseFloat(potSize) < 1000 && (
                                    <p className="text-[9px] text-gray-500 mt-2 italic">* Exempt (Below $1,000)</p>
                                )}
                            </section>

                            <section className="bg-gray-800 p-5 rounded-2xl border border-gray-700">
                                <h3 className="text-[10px] font-black text-gray-400 mb-4 uppercase tracking-widest">Final Chip Counts</h3>
                                {players.map(p => (
                                    <div key={p.id} className="flex items-center justify-between mb-3 last:mb-0">
                                        <div className="flex flex-col">
                                            <span className="text-sm font-black">{p.name}</span>
                                            <span className="text-[9px] text-gray-500 font-bold uppercase tracking-tighter">Paid In: ${p.buyIn}</span>
                                        </div>
                                        <input type="number" className="bg-gray-900 p-3 w-28 rounded-xl text-right font-mono text-green-400 font-bold outline-none" value={p.chips} onChange={e => updatePlayer(p.id, 'chips', parseInt(e.target.value) || 0)} />
                                    </div>
                                ))}
                            </section>

                            <section className="bg-gray-800 p-5 rounded-2xl border-l-4 border-green-500">
                                <h3 className="text-[10px] font-black text-green-500 mb-4 uppercase tracking-widest">Community Pot Distribution</h3>
                                <div className="grid grid-cols-2 gap-3 mb-4">
                                    <div>
                                        <label className="text-[8px] text-gray-500 uppercase font-black">Total Pot</label>
                                        <input type="number" className="bg-gray-900 p-3 w-full rounded-xl text-sm font-bold" value={totalCommPot} onChange={e => setTotalCommPot(parseFloat(e.target.value) || 0)} />
                                    </div>
                                    <div>
                                        <label className="text-[8px] text-gray-500 uppercase font-black">House Rake</label>
                                        <input type="number" className="bg-gray-900 p-3 w-full rounded-xl text-sm font-bold" value={houseRake} onChange={e => setHouseRake(parseFloat(e.target.value) || 0)} />
                                    </div>
                                </div>
                                <div className="flex flex-wrap gap-2">
                                    {players.map(p => (
                                        <button key={p.id} onClick={() => entitledPlayers.includes(p.id) ? setEntitledPlayers(entitledPlayers.filter(i => i !== p.id)) : setEntitledPlayers([...entitledPlayers, p.id])}
                                            className={`text-[9px] font-black uppercase tracking-widest px-4 py-2 rounded-full border transition-all ${entitledPlayers.includes(p.id) ? 'bg-green-600 border-green-400' : 'bg-gray-900 border-gray-700 text-gray-500'}`}>
                                            {p.name}
                                        </button>
                                    ))}
                                </div>
                            </section>

                            <section className="space-y-3">
                                <div className="flex justify-between items-center px-1">
                                    <h3 className="text-[10px] font-black text-gray-400 uppercase tracking-widest">Shared Expenses</h3>
                                    <button onClick={addExpense} className="text-blue-500 text-[10px] font-black">+ ADD ITEM</button>
                                </div>
                                {expenses.map(exp => (
                                    <div key={exp.id} className="bg-gray-800 p-5 rounded-2xl border border-gray-700">
                                        <div className="flex gap-2 mb-4">
                                            <input placeholder="Label" className="bg-gray-900 p-3 rounded-xl flex-1 text-xs font-bold" value={exp.label} onChange={e => updateExpense(exp.id, 'label', e.target.value)} />
                                            <input type="number" className="bg-gray-900 p-3 rounded-xl w-24 text-right font-mono font-bold" value={exp.amount} onChange={e => updateExpense(exp.id, 'amount', parseFloat(e.target.value) || 0)} />
                                        </div>
                                        <div className="flex flex-wrap gap-1">
                                            {players.map(p => (
                                                <button key={p.id} onClick={() => toggleExpensePayer(exp.id, p.id)}
                                                    className={`text-[9px] font-black px-3 py-2 rounded-lg border transition-all ${exp.payers.includes(p.id) ? 'bg-blue-600 border-blue-400 text-white' : 'bg-gray-900 border-gray-700 text-gray-600'}`}>
                                                    {p.name}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                ))}
                            </section>

                            {!showSettlement ? (
                                <button onClick={() => setShowSettlement(true)} className="w-full bg-green-600 p-5 rounded-2xl font-black tracking-widest text-sm shadow-xl shadow-green-900/30 uppercase">Reveal Final Payouts</button>
                            ) : (
                                <div className="bg-white text-gray-900 p-6 rounded-3xl shadow-2xl animate-in zoom-in-95 duration-300">
                                    <h3 className="text-[10px] font-black text-gray-400 mb-6 uppercase tracking-[0.3em] text-center">Final Settlement</h3>
                                    <div className="space-y-4">
                                        {settlements.length > 0 ? settlements.map((s, i) => (
                                            <div key={i} className="flex justify-between items-center border-b border-gray-100 pb-3 last:border-0 last:pb-0">
                                                <div className="flex flex-col"><span className="text-sm font-black uppercase">{s.from}</span><span className="text-[8px] font-bold text-gray-400 tracking-widest uppercase">Pays to {s.to}</span></div>
                                                <span className="font-black text-2xl text-green-600 tracking-tighter">${s.amount}</span>
                                            </div>
                                        )) : <p className="text-center italic text-gray-400 py-4 font-bold">Square.</p>}
                                    </div>
                                    <button onClick={() => setShowSettlement(false)} className="mt-8 w-full text-[10px] font-black text-gray-300 uppercase tracking-widest text-center border-t border-gray-100 pt-4">Back to Edits</button>
                                </div>
                            )}

                            <button onClick={totalRefresh} className="w-full text-red-900/50 font-black text-[10px] uppercase py-10 tracking-[0.3em] hover:text-red-600">Total Reset App</button>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
