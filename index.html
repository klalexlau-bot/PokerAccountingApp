<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cards & Smoke | Ledger</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-gray-100 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        function App() {
            const [view, setView] = useState('manage');
            const [showSettlement, setShowSettlement] = useState(false);
            
            // --- DATA PERSISTENCE ---
            const [players, setPlayers] = useState(() => {
                const saved = localStorage.getItem('cs_players_v4');
                return saved ? JSON.parse(saved) : [{ id: Date.now(), name: "Alex", buyIn: 5000, chips: 0 }];
            });

            const [expenses, setExpenses] = useState(() => {
                const saved = localStorage.getItem('cs_expenses_v4');
                return saved ? JSON.parse(saved) : [];
            });

            // Community Pot State (Manual Inputs)
            const [totalCommPot, setTotalCommPot] = useState(0);
            const [houseRake, setHouseRake] = useState(0);
            const [entitledPlayers, setEntitledPlayers] = useState([]);

            useEffect(() => {
                localStorage.setItem('cs_players_v4', JSON.stringify(players));
                localStorage.setItem('cs_expenses_v4', JSON.stringify(expenses));
            }, [players, expenses]);

            // --- ACTIONS ---
            const addPlayer = () => {
                setPlayers([...players, { id: Date.now(), name: `Seat ${players.length + 1}`, buyIn: 5000, chips: 0 }]);
            };

            const updatePlayer = (id, field, val) => {
                setPlayers(players.map(p => p.id === id ? { ...p, [field]: val } : p));
            };

            const removePlayer = (id) => {
                if (players.length > 1) setPlayers(players.filter(p => p.id !== id));
            };

            const addExpense = () => {
                setExpenses([...expenses, { id: Date.now(), label: "", amount: 0, payers: [] }]);
            };

            const updateExpense = (id, field, val) => {
                setExpenses(expenses.map(e => e.id === id ? { ...e, [field]: val } : e));
            };

            const toggleExpensePayer = (expId, playerId) => {
                setExpenses(expenses.map(e => {
                    if (e.id !== expId) return e;
                    const newPayers = e.payers.includes(playerId) 
                        ? e.payers.filter(id => id !== playerId) 
                        : [...e.payers, playerId];
                    return { ...e, payers: newPayers };
                }));
            };

            const totalRefresh = () => {
                if (window.confirm("TOTAL REFRESH: Reset everything to 'Alex'?")) {
                    setPlayers([{ id: Date.now(), name: "Alex", buyIn: 5000, chips: 0 }]);
                    setExpenses([]);
                    setTotalCommPot(0);
                    setHouseRake(0);
                    setEntitledPlayers([]);
                    setShowSettlement(false);
                }
            };

            // --- SETTLEMENT MATH ---
            const distributablePot = Math.max(0, totalCommPot - houseRake);

            const results = useMemo(() => {
                return players.map(p => {
                    let net = p.chips - p.buyIn;
                    
                    // ADD Community Pot Dividend (Positive Addition)
                    if (entitledPlayers.includes(p.id) && entitledPlayers.length > 0) {
                        net += (distributablePot / entitledPlayers.length);
                    }

                    // SUBTRACT Expense shares (Negative Deduction)
                    expenses.forEach(exp => {
                        if (exp.payers.includes(p.id) && exp.payers.length > 0) {
                            net -= (exp.amount / exp.payers.length);
                        }
                    });

                    return { name: p.name, net: Math.round(net) };
                });
            }, [players, distributablePot, entitledPlayers, expenses]);

            const settlements = useMemo(() => {
                if (!showSettlement) return [];
                let debtors = results.filter(r => r.net < 0).map(r => ({ ...r, net: Math.abs(r.net) }));
                let creditors = results.filter(r => r.net > 0).map(r => ({ ...r }));
                const trans = [];

                debtors.forEach(d => {
                    creditors.forEach(c => {
                        if (d.net > 0 && c.net > 0) {
                            const amount = Math.min(d.net, c.net);
                            trans.push({ from: d.name, to: c.name, amount: Math.round(amount) });
                            d.net -= amount;
                            c.net -= amount;
                        }
                    });
                });
                return trans;
            }, [results, showSettlement]);

            return (
                <div className="max-w-md mx-auto p-4 min-h-screen">
                    <header className="flex justify-between items-center mb-6 border-b border-gray-800 pb-4">
                        <h1 className="font-black text-orange-500 tracking-tighter text-2xl">CARDS & SMOKE</h1>
                        <div className="flex bg-gray-800 rounded-lg p-1">
                            <button onClick={() => setView('manage')} className={`px-4 py-1 rounded-md text-xs font-bold ${view === 'manage' ? 'bg-orange-600' : ''}`}>SETUP</button>
                            <button onClick={() => setView('tally')} className={`px-4 py-1 rounded-md text-xs font-bold ${view === 'tally' ? 'bg-orange-600' : ''}`}>TALLY</button>
                        </div>
                    </header>

                    {view === 'manage' ? (
                        <div className="space-y-3">
                            {players.map(p => (
                                <div key={p.id} className="bg-gray-800 p-4 rounded-xl border border-gray-700">
                                    <div className="flex justify-between items-center mb-3">
                                        <input className="bg-transparent font-bold text-white text-lg outline-none w-3/4 border-b border-transparent focus:border-orange-500" value={p.name} onChange={e => updatePlayer(p.id, 'name', e.target.value)} />
                                        <button onClick={() => removePlayer(p.id)} className="text-gray-500 hover:text-red-500">✕</button>
                                    </div>
                                    <label className="text-[10px] text-gray-500 uppercase font-black">Total Buy-In</label>
                                    <input type="number" className="bg-gray-900 w-full p-3 rounded-lg mt-1 font-mono text-orange-400" value={p.buyIn} onChange={e => updatePlayer(p.id, 'buyIn', parseInt(e.target.value) || 0)} />
                                </div>
                            ))}
                            <button onClick={addPlayer} className="w-full border-2 border-dashed border-gray-700 p-4 rounded-xl text-gray-500 font-bold hover:bg-gray-800">+ Add New Seat</button>
                        </div>
                    ) : (
                        <div className="space-y-6">
                            {/* 1. CHIP COUNT */}
                            <section className="bg-gray-800 p-4 rounded-xl">
                                <h3 className="text-[10px] font-black text-gray-400 mb-4 uppercase tracking-widest">Final Chip Counts</h3>
                                {players.map(p => (
                                    <div key={p.id} className="flex items-center justify-between mb-3 last:mb-0">
                                        <span className="text-sm font-bold">{p.name} <span className="text-gray-500 font-normal ml-1">(${p.buyIn})</span></span>
                                        <input type="number" className="bg-gray-900 p-2 w-24 rounded-lg text-right font-mono text-green-400" value={p.chips} onChange={e => updatePlayer(p.id, 'chips', parseInt(e.target.value) || 0)} />
                                    </div>
                                ))}
                            </section>

                            {/* 2. COMMUNITY POT DIVIDEND */}
                            <section className="bg-gray-800 p-4 rounded-xl border-l-4 border-green-500">
                                <h3 className="text-[10px] font-black text-green-500 mb-3 uppercase tracking-widest">Community Pot Distribution</h3>
                                <div className="grid grid-cols-2 gap-2 mb-3">
                                    <div>
                                        <label className="text-[8px] text-gray-500 uppercase">Total Pot</label>
                                        <input type="number" className="bg-gray-900 p-2 w-full rounded-lg text-sm" value={totalCommPot} onChange={e => setTotalCommPot(parseFloat(e.target.value) || 0)} />
                                    </div>
                                    <div>
                                        <label className="text-[8px] text-gray-500 uppercase">House Rake</label>
                                        <input type="number" className="bg-gray-900 p-2 w-full rounded-lg text-sm" value={houseRake} onChange={e => setHouseRake(parseFloat(e.target.value) || 0)} />
                                    </div>
                                </div>
                                <p className="text-xs text-gray-400 mb-3 italic">Net to share: <span className="text-white font-bold">${distributablePot}</span></p>
                                <div className="flex flex-wrap gap-2">
                                    {players.map(p => (
                                        <button key={p.id} onClick={() => entitledPlayers.includes(p.id) ? setEntitledPlayers(entitledPlayers.filter(i => i !== p.id)) : setEntitledPlayers([...entitledPlayers, p.id])}
                                            className={`text-[9px] px-3 py-1 rounded-full border transition-all ${entitledPlayers.includes(p.id) ? 'bg-green-600 border-green-400' : 'bg-gray-700 border-gray-600 text-gray-500'}`}>
                                            {p.name}
                                        </button>
                                    ))}
                                </div>
                            </section>

                            {/* 3. EXPENSES */}
                            <section className="space-y-2">
                                <div className="flex
