<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cards & Smoke | Secure Poker Ledger</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@300;400;600&display=swap');
        :root { --gold: #c4a14c; --dark-wood: #1a130a; --text-gold: #e8d7b0; }
        body { background-color: #121212; color: var(--text-gold); font-family: 'Inter', sans-serif; touch-action: manipulation; }
        .gold-serif { font-family: 'Cinzel', serif; color: var(--gold); }
        .card { background-color: #271c10; border: 1px solid rgba(196, 161, 76, 0.3); border-radius: 12px; }
        .input-gold { background: rgba(0,0,0,0.3); border: 1px solid var(--gold); color: var(--text-gold); padding: 12px; border-radius: 8px; width: 100%; font-size: 1.25rem; }
        .tab-active { color: var(--gold); border-bottom: 3px solid var(--gold); opacity: 1 !important; }
        .refresh-fab { position: fixed; bottom: 24px; right: 24px; background: var(--gold); color: #000; width: 56px; height: 56px; border-radius: 28px; display: flex; align-items: center; justify-content: center; z-index: 50; box-shadow: 0 4px 15px rgba(0,0,0,0.6); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 4px; }
        button:disabled { opacity: 0.5; cursor: not-allowed; filter: grayscale(1); }
    </style>
</head>
<body class="pb-24">

    <header class="p-6 text-center border-b-2 border-[#c4a14c] bg-[#1a130a]">
        <h1 class="text-3xl font-bold uppercase gold-serif text-shadow">Cards & Smoke</h1>
        <div class="flex items-center justify-center mt-1">
            <span id="sync-status" class="status-dot bg-red-500"></span>
            <p class="text-[10px] italic opacity-70 tracking-widest uppercase">Secured Live Sync</p>
        </div>
    </header>

    <nav class="flex bg-[#221910] border-b border-[#a38548] sticky top-0 z-40">
        <button onclick="showSection('round')" id="btn-round" class="flex-1 py-4 text-sm font-bold tab-active">Round</button>
        <button onclick="showSection('players')" id="btn-players" class="flex-1 py-4 text-sm font-bold opacity-50">Players</button>
        <button onclick="showSection('history')" id="btn-history" class="flex-1 py-4 text-sm font-bold opacity-50">History</button>
    </nav>

    <main class="p-4 space-y-6">
        <div id="section-round" class="section-content">
            <div class="card p-5 space-y-4">
                <div>
                    <label class="text-[10px] uppercase text-gold/60">Pot Size (Max 1M)</label>
                    <input type="number" id="potInput" oninput="updateLiveLevy()" class="input-gold text-4xl text-center" placeholder="0" inputmode="numeric">
                </div>
                <div class="grid grid-cols-2 gap-4 bg-black/30 p-4 rounded-lg border border-gold/10">
                    <div>
                        <p class="text-[10px] opacity-60 uppercase">Levy (5% ≥ 1k)</p>
                        <p id="liveLevy" class="text-2xl font-bold text-red-400">0</p>
                    </div>
                    <div>
                        <p class="text-[10px] opacity-60 uppercase">Winner Net</p>
                        <p id="liveNet" class="text-2xl font-bold text-green-400">0</p>
                    </div>
                </div>
                <div>
                    <label class="text-[10px] uppercase text-gold/60">Select Winner</label>
                    <select id="winnerSelect" class="input-gold"></select>
                </div>
                <button id="confirmBtn" onclick="confirmRound()" class="w-full bg-[#c4a14c] text-black font-bold py-5 rounded-lg active:scale-95 transition-all text-xl uppercase tracking-widest shadow-lg">Confirm Win</button>
            </div>
        </div>

        <div id="section-players" class="section-content hidden space-y-4">
            <div class="card p-4">
                <div class="flex gap-2">
                    <input type="text" id="newPlayerName" maxlength="20" class="input-gold" placeholder="Player Name">
                    <button id="addPlayerBtn" onclick="addPlayer()" class="bg-[#c4a14c] text-black px-6 font-bold rounded-lg shadow-inner">+</button>
                </div>
            </div>
            <div id="playerContainer" class="space-y-3"></div>
        </div>

        <div id="section-history" class="section-content hidden">
            <div class="card p-4">
                <h2 class="gold-serif text-lg mb-4">Live Session History</h2>
                <div id="historyLog" class="space-y-3"></div>
            </div>
        </div>
    </main>

    <button onclick="confirmReset()" class="refresh-fab">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></svg>
    </button>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getFirestore, doc, setDoc, onSnapshot, collection, updateDoc, deleteDoc, writeBatch, increment } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBVtypWYLHnlpjQcVdcr-01mEbWc7erDH4",
            authDomain: "pokeraccountingapp.firebaseapp.com",
            projectId: "pokeraccountingapp",
            storageBucket: "pokeraccountingapp.firebasestorage.app",
            messagingSenderId: "453989055970",
            appId: "1:453989055970:web:ea1bfc38ef564b38d94dbb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const appId = 'cards-smoke-production'; 

        let user = null;
        let localPlayers = [];
        let localHouse = 0;
        let lastActionTime = 0;

        onAuthStateChanged(auth, async (u) => {
            if (!u) {
                await signInAnonymously(auth);
            } else {
                user = u;
                document.getElementById('sync-status').classList.replace('bg-red-500', 'bg-green-500');
                initLiveSync();
            }
        });

        // --- ANTI-DDOS / RATE LIMITING ---
        function checkRateLimit() {
            const now = Date.now();
            if (now - lastActionTime < 2000) { // 2 second cooldown
                return false;
            }
            lastActionTime = now;
            return true;
        }

        // --- SANITIZATION ---
        function sanitize(str) {
            const temp = document.createElement('div');
            temp.textContent = str;
            return temp.innerHTML.slice(0, 25); // Limit length
        }

        function initLiveSync() {
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'players'), (snap) => {
                localPlayers = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                render();
            });

            onSnapshot(doc(db, 'artifacts', appId, 'public', 'data', 'totals', 'house'), (d) => {
                localHouse = d.exists() ? d.data().value : 0;
                render();
            });

            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'history'), (snap) => {
                const logs = snap.docs.map(d => d.data()).sort((a,b) => b.timestamp - a.timestamp);
                renderHistory(logs);
            });
        }

        window.updateLiveLevy = () => {
            const pot = Math.min(parseFloat(document.getElementById('potInput').value) || 0, 1000000); // Guardrail
            let levy = pot >= 1000 ? Math.ceil((pot * 0.05) / 10) * 10 : 0;
            document.getElementById('liveLevy').innerText = levy.toLocaleString();
            document.getElementById('liveNet').innerText = (pot - levy).toLocaleString();
        };

        window.showSection = (id) => {
            document.querySelectorAll('.section-content').forEach(s => s.classList.add('hidden'));
            document.querySelectorAll('nav button').forEach(b => { b.classList.add('opacity-50'); b.classList.remove('tab-active'); });
            document.getElementById('section-' + id).classList.remove('hidden');
            document.getElementById('btn-' + id).classList.replace('opacity-50', 'tab-active');
        };

        window.addPlayer = async () => {
            if (!checkRateLimit()) return;
            const btn = document.getElementById('addPlayerBtn');
            const nameInput = document.getElementById('newPlayerName');
            const name = sanitize(nameInput.value.trim());

            if (name && user) {
                btn.disabled = true;
                const id = Date.now().toString();
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'players', id), { 
                    name, 
                    balance: 0, 
                    expanded: false,
                    createdAt: Date.now() 
                });
                nameInput.value = '';
                btn.disabled = false;
            }
        };

        window.confirmRound = async () => {
            if (!checkRateLimit()) return;
            const btn = document.getElementById('confirmBtn');
            const pot = Math.min(parseFloat(document.getElementById('potInput').value) || 0, 1000000);
            const winnerIdx = document.getElementById('winnerSelect').value;

            if (pot <= 0 || winnerIdx === "" || !user) return;

            btn.disabled = true;
            const winner = localPlayers[winnerIdx];
            let levy = pot >= 1000 ? Math.ceil((pot * 0.05) / 10) * 10 : 0;
            const net = pot - levy;

            try {
                const batch = writeBatch(db);
                // Atomic increments prevent race conditions
                batch.update(doc(db, 'artifacts', appId, 'public', 'data', 'players', winner.id), { 
                    balance: increment(net) 
                });
                batch.set(doc(db, 'artifacts', appId, 'public', 'data', 'totals', 'house'), { 
                    value: increment(levy) 
                }, { merge: true });
                
                const logId = Date.now().toString();
                batch.set(doc(db, 'artifacts', appId, 'public', 'data', 'history', logId), {
                    timestamp: Date.now(),
                    timeString: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                    winner: winner.name, pot, levy, net
                });

                await batch.commit();
                document.getElementById('potInput').value = '';
                window.updateLiveLevy();
            } finally {
                setTimeout(() => { btn.disabled = false; }, 1000);
            }
        };

        window.toggleExpand = async (id, currentVal) => {
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'players', id), { expanded: !currentVal });
        };

        window.manualAdj = async (id, amt) => {
            if (!checkRateLimit()) return;
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'players', id), { balance: increment(amt) });
        };

        window.confirmReset = async () => {
            if (confirm("HARD RESET: Wipe all cloud data? (This cannot be undone)")) {
                const batch = writeBatch(db);
                localPlayers.forEach(p => batch.delete(doc(db, 'artifacts', appId, 'public', 'data', 'players', p.id)));
                batch.set(doc(db, 'artifacts', appId, 'public', 'data', 'totals', 'house'), { value: 0 });
                await batch.commit();
            }
        };

        function renderHistory(logs) {
            document.getElementById('historyLog').innerHTML = logs.slice(0, 15).map(h => `
                <div class="flex justify-between items-center border-b border-white/5 pb-2">
                    <div class="text-[10px] opacity-60">
                        <p class="text-xs text-white font-bold uppercase tracking-tighter">${h.winner}</p>
                        <p>${h.timeString} | Pot: ${h.pot.toLocaleString()}</p>
                    </div>
                    <div class="text-right">
                        <p class="text-green-400 font-bold">+${h.net.toLocaleString()}</p>
                        ${h.levy > 0 ? `<p class="text-red-500 text-[9px]">Levy: ${h.levy.toLocaleString()}</p>` : ''}
                    </div>
                </div>
            `).join('');
        }

        function render() {
            const select = document.getElementById('winnerSelect');
            const currentWinner = select.value;
            select.innerHTML = '<option value="">Select Winner...</option>' + 
                localPlayers.map((p, i) => `<option value="${i}">${p.name}</option>`).join('');
            select.value = currentWinner;

            document.getElementById('playerContainer').innerHTML = `
                <div class="card p-4 border-yellow-500/50 bg-black/40 mb-4 shadow-[0_0_15px_rgba(196,161,76,0.1)]">
                    <div class="flex justify-between items-center">
                        <span class="gold-serif uppercase text-xs tracking-widest">Global House Pool</span>
                        <span class="text-2xl font-bold text-yellow-500">${localHouse.toLocaleString()}</span>
                    </div>
                </div>
            ` + localPlayers.map((p, i) => `
                <div class="card mb-2 ${p.expanded ? 'expanded' : ''}">
                    <div onclick="toggleExpand('${p.id}', ${p.expanded})" class="p-4 flex justify-between items-center cursor-pointer active:bg-white/5">
                        <span class="font-bold text-lg">${p.name}</span>
                        <span class="text-xl font-mono ${p.balance >= 0 ? 'text-green-400' : 'text-red-400'}">
                            ${p.balance >= 0 ? '+' : ''}${p.balance.toLocaleString()}
                        </span>
                    </div>
                    <div class="collapsible-content bg-black/20 px-4 pb-4">
                        <div class="grid grid-cols-2 gap-2 mt-2">
                            <button onclick="manualAdj('${p.id}', 500)" class="bg-green-600/20 py-3 rounded border border-green-600/30 font-bold active:scale-95 transition-all">+500</button>
                            <button onclick="manualAdj('${p.id}', -500)" class="bg-red-600/20 py-3 rounded border border-red-600/30 font-bold active:scale-95 transition-all">-500</button>
                        </div>
                        <button onclick="if(confirm('Delete ${p.name}?')){deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'players', '${p.id}'));}" class="w-full text-[10px] text-red-500/60 py-3 mt-2 uppercase tracking-tighter">Remove Player</button>
                    </div>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
